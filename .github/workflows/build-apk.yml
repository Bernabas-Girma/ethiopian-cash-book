name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up debug keystore for Google Sign-in
        run: |
          # Check if a committed keystore exists
          if [ -f android/app/debug.keystore ]; then
            echo "Using existing debug.keystore from repo"
          else
            echo "No keystore found - generating a new one..."
            echo "⚠️  IMPORTANT: Download the keystore artifact, commit it to the repo,"
            echo "    and add the SHA-1 to Firebase Console!"
            keytool -genkey -v \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=CashBook Debug,OU=CashBook,O=CashBook,L=Addis Ababa,ST=AA,C=ET"
          fi
          
          # Always print SHA-1 for reference
          echo ""
          echo "============================================"
          echo "SHA-1 FINGERPRINT FOR FIREBASE:"
          keytool -list -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -storepass android 2>/dev/null | grep "SHA1:"
          echo "============================================"

      - name: Fix Gradle wrapper jar
        run: |
          curl -L "https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload keystore (download and commit to repo if new)
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: android/app/debug.keystore
          retention-days: 30
